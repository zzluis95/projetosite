<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLEEPY RUNNER - Jogar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <nav class="navbar">
        <button id="toggle-theme" class="theme-btn">
            <i class="fa-solid fa-sun"></i>
        </button>
        <div class="logo">
            <a href="index.html">
                <img src="./images/logo.png" alt="Logo do Jogo">
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="galeria.html"><strong>Galeria</strong></a></li>
            <li><a href="sobre.html"><strong>Sobre</strong></a></li>
            <li><a href="contato.html"><strong>Contato</strong></a></li>
            <li><a href="jogar.html"><strong>Jogar</strong></a></li>
        </ul>
    </nav>

    <!-- ÁREA DO JOGO -->
    <main class="container">
        <div class="card">
            <h3>Divirta-se jogando!</h3>
            <p>O jogo está sendo carregado diretamente do seu computador.</p>
            
            <!-- Caixa que segura o jogo -->
            <div class="jogo-wrapper">
                <!-- Se o arquivo do seu jogo tiver outro nome, mude aqui no src -->
                <iframe src="/jogo/index.html" frameborder="0" scrolling="no" allowfullscreen></iframe>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>Desenvolvido por zzluis95</p>
            <div class="social-icons">
                <a href="https://www.instagram.com/zzluis95/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://discord.gg/uGp8hfuECT" target="_blank"><i class="fa-brands fa-discord"></i></a>
                <a href="https://twitter.com" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
            </div>
        </div>

        <script>
            const themeBtn = document.getElementById('toggle-theme');
            const body = document.body;

            themeBtn.addEventListener('click', () => {
                body.classList.toggle('light-mode');
                const icon = themeBtn.querySelector('i');
                if (body.classList.contains('light-mode')) {
                    icon.classList.remove('fa-sun');
                    icon.classList.add('fa-moon');
                    themeBtn.style.borderColor = "#76008d";
                } else {
                    icon.classList.remove('fa-moon');
                    icon.classList.add('fa-sun');
                }
            });
        </script>
    </footer>

</body>
</html>
